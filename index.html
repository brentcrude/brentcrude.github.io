<!DOCTYPE html>
<html>
<head>
  <title>BC: Main</title>
  <style>
    #myBox {
      width: 25%;
      height: 100px;
      background-color: rgb(61, 123, 255);
      text-align: center;
      line-height: 150px;
      font-weight: bold;
      transition: background-color 0.3s;
      cursor: pointer;
      /* remove box margins */
      margin: 0;
    }

    #myBox:hover {
      background-color: rgb(0, 81, 255);
    }
    #myBox.active {
      background-color: rgb(0, 81, 255);
  }
  </style>
</head>
<body>
  <div class="container">
    <div id="myBox" class="active">Home</div>
    <div id="myBox">2</div>
    <div id="myBox">3</div>
    <div id="myBox">4</div>
  </div>
  <!-- The input field (hidden by default) -->
  <input type="text" id="myInput" placeholder="Type here..." style="display:none">

  <script>
    let showInput = true;   // change this to false to hide it

    if (showInput) {
      document.getElementById("myInput").style.display = "block";
    } else {
      document.getElementById("myInput").style.display = "none";
    }
  </script>
</body>
</html>
