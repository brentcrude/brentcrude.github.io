<!DOCTYPE html>
<html>
<head>
  <title>BC: Main</title>
  <style>
    #myBox {
      width: 25%;
      height: 100px;
      background-color: rgb(61, 123, 255);
      text-align: center;
      line-height: 150px;
      font-weight: bold;
      transition: background-color 0.3s;
      cursor: pointer;

      /* remove box margins */
      margin: 0;
    }

    #myBox:hover {
      background-color: orange;
    }
  </style>
</head>
<body>
  <div>
    <div id="myBox">Link Here</div>
    <div id="myBox">2</div>
    <div id="myBox">3</div>
    <div id="myBox">4</div>
  </div>
</body>
