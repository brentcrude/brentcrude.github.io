<!DOCTYPE html>
<html>
<head>
  <title>BRENT CRUDE IS UP!</title>
  <style>
    #myBox {
      width: 200px;
      height: 150px;
      background-color: lightblue;
      text-align: center;
      line-height: 150px;
      font-weight: bold;
      transition: background-color 0.3s;
      cursor: pointer;

      /* remove box margins */
      margin: 0;
    }

    #myBox:hover {
      background-color: orange;
    }
  </style>
</head>
<body>
  <div id="myBox">Hover over me!</div>
</body>
