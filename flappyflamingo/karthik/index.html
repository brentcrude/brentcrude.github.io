<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Karthik AB Game</title>
    <style>
        body {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            font-family: Arial, sans-serif;
            transition: background-color 0.3s;
        }
        
        body.bg-green {
            background: #4caf50;
        }
        
        body.bg-red {
            background: #f44336;
        }
        
        #letter {
            font-size: 200px;
            font-weight: bold;
            color: white;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.3);
            margin-bottom: 30px;
        }
        
        #feedback {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 80px;
            font-weight: bold;
            color: white;
            opacity: 0;
            transition: opacity 0.3s;
            pointer-events: none;
        }
        
        button {
            padding: 15px 30px;
            font-size: 18px;
            background-color: white;
            color: #667eea;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            transition: transform 0.2s;
        }
        
        button:hover {
            transform: scale(1.05);
        }
        
        button:active {
            transform: scale(0.95);
        }
        
        #stats {
            position: absolute;
            top: 20px;
            right: 20px;
            color: white;
            font-size: 18px;
            font-weight: bold;
        }
        
        #timer {
            position: absolute;
            top: 20px;
            left: 20px;
            color: white;
            font-size: 18px;
            font-weight: bold;
        }
        
        #username-section {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            z-index: 10;
        }
        
        #username-section h1 {
            color: white;
            margin-bottom: 20px;
        }
        
        #username-input {
            padding: 10px;
            font-size: 18px;
            border: none;
            border-radius: 8px;
            width: 200px;
            margin-bottom: 20px;
        }
        
        #username-section button {
            padding: 10px 20px;
            font-size: 16px;
        }
        
        #high-score {
            color: white;
            font-size: 16px;
            margin-top: 20px;
        }
        
        .button-group {
            display: flex;
            gap: 20px;
            margin-top: 30px;
        }
        
        #game-container {
            display: none;
        }
    </style>
</head>
<body>
    <div id="timer">Time: 0s</div>
    <div id="stats">Points: 0</div>
    <div id="letter">A</div>
    <div class="button-group">
        <button onclick="answerRight()">Right</button>
        <button onclick="answerWrong()">Wrong</button>
    </div>
    
    <script>
        let points = 0;
        let seconds = 0;
        let timerInterval;
        let letterWeights = {};
        
        function initializeWeights() {
            const letters = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ'.split('');
            letters.forEach(letter => {
                letterWeights[letter] = 1;
            });
        }
        
        function generateLetter() {
            const letters = Object.keys(letterWeights);
            const totalWeight = letters.reduce((sum, letter) => sum + letterWeights[letter], 0);
            let random = Math.random() * totalWeight;
            
            for (let letter of letters) {
                random -= letterWeights[letter];
                if (random <= 0) {
                    document.getElementById('letter').textContent = letter;
                    return;
                }
            }
            document.getElementById('letter').textContent = letters[0];
        }
        
        function answerRight() {
            points++;
            document.getElementById('stats').textContent = 'Points: ' + points;
            const currentLetter = document.getElementById('letter').textContent;
            letterWeights[currentLetter] = Math.max(1, letterWeights[currentLetter] * 0.8);
            generateLetter();
        }
        
        function answerWrong() {
            const currentLetter = document.getElementById('letter').textContent;
            letterWeights[currentLetter] *= 1.5;
            generateLetter();
        }
        
        function startTimer() {
            timerInterval = setInterval(function() {
                seconds++;
                document.getElementById('timer').textContent = 'Time: ' + seconds + 's';
            }, 1000);
        }
        
        // Generate a random letter on page load and start timer
        generateLetter();
        startTimer();
    </script>
</body>
</html>
