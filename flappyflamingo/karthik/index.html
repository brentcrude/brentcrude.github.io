<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Random Letter</title>
    <style>
        body {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            font-family: Arial, sans-serif;
        }
        
        #letter {
            font-size: 200px;
            font-weight: bold;
            color: white;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.3);
            margin-bottom: 30px;
        }
        
        button {
            padding: 15px 30px;
            font-size: 18px;
            background-color: white;
            color: #667eea;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            transition: transform 0.2s;
        }
        
        button:hover {
            transform: scale(1.05);
        }
        
        button:active {
            transform: scale(0.95);
        }
        
        #stats {
            position: absolute;
            top: 20px;
            right: 20px;
            color: white;
            font-size: 18px;
            font-weight: bold;
        }
        
        #timer {
            position: absolute;
            top: 20px;
            left: 20px;
            color: white;
            font-size: 18px;
            font-weight: bold;
        }
        
        .button-group {
            display: flex;
            gap: 20px;
            margin-top: 30px;
        }
    </style>
</head>
<body>
    <div id="timer">Time: 0s</div>
    <div id="stats">Points: 0</div>
    <div id="letter">A</div>
    <div class="button-group">
        <button onclick="answerRight()">Right</button>
        <button onclick="answerWrong()">Wrong</button>
    </div>
    
    <script>
        let points = 0;
        let seconds = 0;
        let timerInterval;
        
        function generateLetter() {
            const letters = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ';
            const randomIndex = Math.floor(Math.random() * letters.length);
            document.getElementById('letter').textContent = letters[randomIndex];
        }
        
        function answerRight() {
            points++;
            document.getElementById('stats').textContent = 'Points: ' + points;
            generateLetter();
        }
        
        function answerWrong() {
            generateLetter();
        }
        
        function startTimer() {
            timerInterval = setInterval(function() {
                seconds++;
                document.getElementById('timer').textContent = 'Time: ' + seconds + 's';
            }, 1000);
        }
        
        // Generate a random letter on page load and start timer
        generateLetter();
        startTimer();
    </script>
</body>
</html>
